<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa 9º Ano</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#009c3b,#ffdf00,#002776);
padding:20px;
text-align:center;
color:white;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(0,0,0,.25);
backdrop-filter:blur(5px);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h1{font-size:3rem;margin-bottom:10px;}
.sub{font-size:1.2rem;margin-bottom:15px;}

.valor{
font-size:2rem;
font-weight:bold;
margin-top:10px;
}

.numeros{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
margin-top:20px;
}

.numero{
background:white;
color:black;
padding:10px 0;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.numero:hover{transform:scale(1.05);}

.numero.selecionado{
background:#00c853;
color:white;
}

.numero.vendido{
background:red;
color:white;
pointer-events:none;
}

input{
width:100%;
max-width:450px;
padding:15px;
border:none;
border-radius:10px;
margin:8px;
font-size:16px;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
background:#00c853;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{opacity:.9;}

.qr{
max-width:250px;
border-radius:15px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<!-- 🔵 TOPO ORIGINAL -->
<div class="card">
<h1>🎟️ Rifa 9º Ano</h1>
<p class="sub">Em prol do nosso projeto de viagem</p>

<div class="valor">R$ 8,00 por número</div>

<p style="margin-top:10px;">🔥 Apenas 100 números disponíveis!</p>
<h3 style="margin-top:10px;">📅 Sorteio: 01/07</h3>
</div>

<!-- 🔵 NÚMEROS -->
<div class="card">
<h2>Escolha seus números</h2>
<p id="selecionados">Nenhum número selecionado</p>
<div class="numeros" id="numeros"></div>
</div>

<!-- 🔵 DADOS -->
<div class="card">
<h2>Dados do Comprador</h2>

<input id="nome" placeholder="Nome Completo">
<input id="telefone" placeholder="WhatsApp">

<br>

<button id="reservar">Reservar Números</button>
</div>

<!-- 🔵 PIX -->
<div class="card">
<h2>💳 PIX</h2>
<p><strong>Valentina Santos Ferreira</strong></p>
<p>CPF: 114.354.385-82</p>

<img src="1fe7cdfa-6648-490b-9452-fa97b360f041.jpeg" class="qr">
</div>

</div>

<script>
const numerosDiv = document.getElementById("numeros");

let escolhidos = [];
let vendidos = [];
const valorNumero = 8;

// 🔥 carregar vendidos
fetch("vendidos.json")
.then(r => r.json())
.then(data => {
  vendidos = data || [];
  criarNumeros();
})
.catch(() => {
  vendidos = [];
  criarNumeros();
});

function criarNumeros(){

for(let i=1;i<=100;i++){

  const div = document.createElement("div");
  div.className = "numero";
  div.innerText = String(i).padStart(2,"0");

  if(vendidos.includes(i)){
    div.classList.add("vendido");
  }

  div.onclick = () => {

    if(vendidos.includes(i)) return;

    div.classList.toggle("selecionado");

    if(div.classList.contains("selecionado")){
      escolhidos.push(i);
    } else {
      escolhidos = escolhidos.filter(n => n !== i);
    }

    document.getElementById("selecionados").innerText =
      escolhidos.length
      ? "Você escolheu: " + escolhidos.map(n => String(n).padStart(2,"0")).join(", ")
      : "Nenhum número selecionado";
  };

  numerosDiv.appendChild(div);
}
}

document.getElementById("reservar").onclick = () => {

if(!escolhidos.length){
  alert("Escolha números!");
  return;
}

const nome = document.getElementById("nome").value;
const tel = document.getElementById("telefone").value;

if(!nome || !tel){
  alert("Preencha seus dados!");
  return;
}

const total = escolhidos.length * valorNumero;

const msg =
`🎟️ NOVA RESERVA

Nome: ${nome}
WhatsApp: ${tel}
Números: ${escolhidos.map(n=>String(n).padStart(2,"0")).join(", ")}
Total: R$ ${total}`;

window.open(
`https://wa.me/5573981736000?text=${encodeURIComponent(msg)}`
);

escolhidos = [];
document.getElementById("selecionados").innerText = "Nenhum número selecionado";
document.querySelectorAll(".numero").forEach(n => n.classList.remove("selecionado"));

};
</script>

</body>
</html>
