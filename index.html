<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa 9º Ano</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#009c3b,#ffdf00,#002776);
  text-align:center;
  color:white;
  padding:20px;
}

.numeros{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:6px;
  margin-top:20px;
}

.numero{
  background:white;
  color:black;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.numero.selecionado{
  background:#00c853;
  color:white;
}

.numero.vendido{
  background:red;
  color:white;
  pointer-events:none;
}
</style>
</head>

<body>

<h1>Rifa 9º Ano</h1>

<p id="selecionados">Nenhum número selecionado</p>

<div class="numeros" id="numeros"></div>

<input id="nome" placeholder="Nome"><br><br>
<input id="telefone" placeholder="WhatsApp"><br><br>

<button id="reservar">Reservar</button>

<script>
const numerosDiv = document.getElementById("numeros");

let escolhidos = [];
let vendidos = [];

const valorNumero = 8;

// 🔥 CARREGA O JSON PRIMEIRO
fetch("vendidos.json")
  .then(r => r.json())
  .then(data => {
    vendidos = data;
    criarNumeros();
  })
  .catch(() => {
    vendidos = [];
    criarNumeros();
  });

function criarNumeros(){

  for(let i=1;i<=100;i++){

    const div = document.createElement("div");
    div.className = "numero";
    div.innerText = String(i).padStart(2,"0");

    // 🔴 vendido
    if(vendidos.includes(i)){
      div.classList.add("vendido");
    }

    div.onclick = () => {

      if(vendidos.includes(i)) return;

      div.classList.toggle("selecionado");

      if(div.classList.contains("selecionado")){
        escolhidos.push(i);
      } else {
        escolhidos = escolhidos.filter(n => n !== i);
      }

      document.getElementById("selecionados").innerText =
        escolhidos.length
        ? "Você escolheu: " + escolhidos.map(n => String(n).padStart(2,"0")).join(", ")
        : "Nenhum número selecionado";
    };

    numerosDiv.appendChild(div);
  }
}

// botão reservar
document.getElementById("reservar").onclick = () => {

  if(!escolhidos.length){
    alert("Escolha números!");
    return;
  }

  const nome = document.getElementById("nome").value;
  const tel = document.getElementById("telefone").value;

  if(!nome || !tel){
    alert("Preencha os dados!");
    return;
  }

  const total = escolhidos.length * valorNumero;

  const msg =
`Nome: ${nome}
WhatsApp: ${tel}
Números: ${escolhidos.join(", ")}
Total: R$ ${total}`;

  window.open(`https://wa.me/5573981736000?text=${encodeURIComponent(msg)}`);
};
</script>

</body>
</html>
